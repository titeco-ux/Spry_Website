<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concentric → Grid</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Tall track. The inner .sticky pins to the viewport while we scroll,
       and scroll distance inside the track maps to animation progress. -->
  <section class="track">
    <div class="sticky">
      <div class="stage" id="stage">
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
        <div class="circle"><span class="dot"></span></div>
      </div>

      <div class="section-num" id="sectionNum">01 / 04</div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
